  body {
    background-color: rgb(var(--c-page-bg));
  }
  body.font-dyslexic {
    font-family: 'OpenDyslexic', sans-serif;
  }
  /* Font size control */
  body.font-size-sm { font-size: 14px; }
  body.font-size-base { font-size: 16px; } /* Default */
  body.font-size-lg { font-size: 19px; }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(-10px); }
    15% { opacity: 1; transform: translateY(0); }
    85% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(10px); }
  }
  .animate-fade-in-out {
    animation: fadeInOut 7s ease-in-out forwards;
  }
  
  @keyframes pop-in {
    0% { transform: scale(0.9); opacity: 0; }
    70% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .animate-pop-in {
    animation: pop-in 0.3s ease-out forwards;
  }

  @keyframes shake-horizontal {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .animate-shake {
    animation: shake-horizontal 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }

  @media print {
    body {
      background-color: #fff !important;
      font-size: 12pt;
    }
    body * {
      visibility: hidden;
      box-shadow: none !important;
      border: none !important;
      color: #000 !important;
      background: transparent !important;
    }
    .printable-area, .printable-area * {
      visibility: visible;
    }
    .printable-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      margin: 20px;
      padding: 0;
    }
    .no-print {
      display: none !important;
    }
    .print-header h1 {
        font-size: 24pt;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
     .print-section {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 2px solid #ccc !important;
        page-break-inside: avoid;
     }
     .print-section-title {
        font-size: 16pt;
        font-weight: bold;
        margin-bottom: 10px;
     }
     .print-bar-chart-container .print-bar {
        background-color: #e0e0e0 !important; /* Use a light grey for the bar background */
        border: 1px solid #000 !important;
     }
     .print-bar-chart-container .print-bar > div {
        background-color: #555 !important; /* Use a dark grey for the progress */
        color: #fff !important;
        text-align: center;
        font-weight: bold;
        padding: 2px;
     }
     .print-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
     }
     .print-list-item {
        display: block;
        margin-bottom: 8px;
        font-size: 12pt;
     }
  }

  @keyframes confetti-fall {
    0% {
      transform: translateY(-20vh) rotateZ(0deg) rotateX(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(120vh) rotateZ(720deg) rotateX(360deg);
      opacity: 0;
    }
  }
  .confetti {
    position: absolute;
    top: 0;
    width: 10px;
    height: 20px;
    opacity: 0;
    animation-name: confetti-fall;
    animation-timing-function: linear;
    animation-iteration-count: 1;
  }
