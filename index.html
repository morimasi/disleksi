  body {
    background-color: rgb(var(--c-page-bg));
    color: rgb(var(--c-text-primary));
    transition: background-color 300ms ease-in-out, color 300ms ease-in-out;
  }
  body.font-dyslexic {
    font-family: 'OpenDyslexic', sans-serif;
  }
  /* Font size control */
  body.font-size-sm { font-size: 14px; }
  body.font-size-base { font-size: 16px; } /* Default */
  body.font-size-lg { font-size: 19px; }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(-10px); }
    15% { opacity: 1; transform: translateY(0); }
    85% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(10px); }
  }
  .animate-fade-in-out {
    animation: fadeInOut 7s ease-in-out forwards;
  }
  
  @keyframes pop-in {
    0% { transform: scale(0.9); opacity: 0; }
    70% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .animate-pop-in {
    animation: pop-in 0.3s ease-out forwards;
  }

  @keyframes shake-horizontal {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .animate-shake {
    animation: shake-horizontal 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes pulse-ring {
    0% {
      box-shadow: 0 0 0 0px rgba(251, 191, 36, 0.7);
    }
    70% {
      box-shadow: 0 0 0 10px rgba(251, 191, 36, 0);
    }
    100% {
      box-shadow: 0 0 0 0px rgba(251, 191, 36, 0);
    }
  }
  .animate-pulse-ring {
    animation: pulse-ring 2s infinite;
  }

  @media print {
    /* --- General Print Reset --- */
    body {
        background-color: #ffffff !important;
        font-size: 12pt;
        margin: 0;
        padding: 0;
    }

    /* Hide elements not intended for printing */
    .no-print {
        display: none !important;
    }

    /* --- Isolate Printable Area --- */
    /* This is the core logic: hide everything first... */
    body * {
        visibility: hidden;
        box-shadow: none !important;
    }
    
    /* ...then reveal the printable area and its contents. */
    .printable-area, .printable-area * {
        visibility: visible;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    
    /* Position the printable area to fill the page */
    .printable-area {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 1cm !important; /* Add a sensible margin for printing */
        border: none !important;
    }

    /* --- Activity-Specific Print Styling --- */
    .printable-area .question-card {
        background-color: #ffffff !important;
        border: 1px solid #cccccc !important;
        padding: 15px !important;
        page-break-inside: avoid; /* Try to keep questions on one page */
        margin-bottom: 15px;
    }

    .printable-area .question-number {
       background-color: #f0f0f0 !important;
       color: #000000 !important;
       border: 1px solid #cccccc;
    }
    
    .printable-area input, .printable-area textarea {
       border: 1px solid #aaaaaa !important;
       background-color: #f8f8f8 !important;
    }

    /* Ensure text is black for readability */
    .printable-area, .printable-area p, .printable-area h3, .printable-area span, .printable-area div {
        color: #000000 !important;
    }

    /* From original print styles for PDF report */
     .print-header h1 {
        font-size: 24pt;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
     .print-section {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 2px solid #ccc !important;
        page-break-inside: avoid;
     }
     .print-section-title {
        font-size: 16pt;
        font-weight: bold;
        margin-bottom: 10px;
     }
     .print-bar-chart-container .print-bar {
        background-color: #e0e0e0 !important;
        border: 1px solid #000 !important;
     }
     .print-bar-chart-container .print-bar > div {
        background-color: #555 !important;
        color: #fff !important;
        text-align: center;
        font-weight: bold;
        padding: 2px;
     }
     .print-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
     }
     .print-list-item {
        display: block;
        margin-bottom: 8px;
        font-size: 12pt;
     }
  }

  @keyframes confetti-fall {
    0% {

      opacity: 1;
    }
    100% {
      transform: translateY(120vh) rotateZ(720deg) rotateX(360deg);
      opacity: 0;
    }
  }
  .confetti {

    width: 10px;
    height: 20px;
    opacity: 0;
