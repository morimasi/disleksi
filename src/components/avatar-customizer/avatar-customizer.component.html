<div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center animate-fade-in no-print" (click)="handleClose()">
  <div class="bg-slate-50 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] m-4 transform transition-all flex flex-col" (click)="$event.stopPropagation()">
    <header class="p-4 border-b border-slate-200 flex justify-between items-center">
      <h2 class="text-2xl font-bold text-slate-800">Baykuşunu Özelleştir</h2>
      <button (click)="handleClose()" class="p-2 rounded-full text-slate-500 hover:bg-slate-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </header>

    <div class="flex-grow overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Avatar Preview -->
      <div class="flex flex-col items-center justify-center bg-gradient-to-br from-indigo-100 to-blue-100 rounded-xl p-6">
        <div class="relative w-48 h-48 flex items-center justify-center">
          <span class="text-[180px] leading-none select-none">🦉</span>
          @for(item of avatarWithEquippedItems(); track item.id) {
            <span class="absolute text-6xl select-none animate-pop-in"
                  [class.top-[-30px]]="item.category === 'head'"
                  [class.top-[45px]]="item.category === 'eyes'"
                  [class.bottom-[-5px]]="item.category === 'neck'"
                  [class.bottom-[-20px]]="item.category === 'accessory'"
                  [class.right-[-20px]]="item.id === 'avatar_accessory_rocket'"
                  [style.transform]="item.id === 'avatar_hat_wizard' ? 'translateX(-10px) translateY(-5px) rotate(-15deg)' : ''"
                  [style.fontSize]="item.id === 'avatar_hat_wizard' ? '80px' : ''">
              {{ item.icon }}
            </span>
          }
        </div>
      </div>
      
      <!-- Item Selection -->
      <div class="space-y-4">
        @for(category of categoryOrder; track category) {
           @if(itemsByCategory()[category]) {
            <div>
              <h3 class="font-bold text-lg text-slate-700 mb-2">{{ categoryNames[category] }}</h3>
              <div class="grid grid-cols-4 gap-3">
                @for(item of itemsByCategory()[category]; track item.id) {
                  <button (click)="toggleItem(item)" 
                          [title]="item.name + (item.isUnlocked ? '' : ' (Kilitli)')"
                          class="relative aspect-square rounded-lg border-2 transition-all duration-200 flex items-center justify-center"
                          [class.border-indigo-500]="item.isEquipped"
                          [class.ring-4]="item.isEquipped"
                          [class.ring-indigo-200]="item.isEquipped"
                          [class.border-slate-300]="!item.isEquipped"
                          [class.hover:border-indigo-400]="item.isUnlocked && !item.isEquipped"
                          [class.cursor-pointer]="item.isUnlocked"
                          [class.cursor-not-allowed]="!item.isUnlocked"
                          [class.bg-white]="item.isUnlocked"
                          [class.bg-slate-100]="!item.isUnlocked">
                      <span class="text-4xl transition-transform" [class.scale-110]="item.isEquipped">{{ item.icon }}</span>
                      @if (!item.isUnlocked) {
                        <div class="absolute inset-0 bg-slate-200/70 backdrop-blur-sm flex items-center justify-center rounded-md">
                          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd" /></svg>
                        </div>
                      }
                  </button>
                }
              </div>
            </div>
           }
        }
      </div>
    </div>

    <footer class="p-4 bg-slate-100 border-t border-slate-200 flex justify-end items-center gap-3">
        <button (click)="handleClose()" class="bg-white hover:bg-slate-100 text-slate-700 font-bold py-2 px-6 rounded-lg border border-slate-300 transition-colors">Vazgeç</button>
        <button (click)="handleSave()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">Kaydet</button>
    </footer>
  </div>
</div>
