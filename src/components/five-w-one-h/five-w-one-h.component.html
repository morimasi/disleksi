<div class="bg-white p-4 sm:p-8 rounded-2xl shadow-xl border border-gray-200 animate-fade-in">
  <!-- Initial State: Grade and theme selection and generate button -->
  @if (!generatedActivity()) {
    <div class="text-center max-w-2xl mx-auto">
      <h2 class="text-3xl font-bold text-gray-800">5N1K Hikaye Atölyesi</h2>
      <p class="mt-2 text-lg text-gray-600">Okuduğunu anlama becerini geliştirmek için bir hikaye oluşturalım ve sorularını cevaplayalım.</p>
      
      <div class="my-8 space-y-8">
        <!-- Grade Level Selection -->
        <div>
          <label class="text-xl font-semibold text-gray-700 mb-3 block">1. Sınıf Düzeyini Seç</label>
          <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
            <label class="flex-1">
              <input type="radio" name="grade" value="ilkokul" [checked]="gradeLevel() === 'ilkokul'" (change)="gradeLevel.set('ilkokul')" class="sr-only peer">
              <div class="p-4 text-center rounded-lg border-2 cursor-pointer transition-all peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 hover:border-indigo-400 font-semibold text-lg">
                İlkokul (1-4. Sınıf)
              </div>
            </label>
            <label class="flex-1">
              <input type="radio" name="grade" value="ortaokul" [checked]="gradeLevel() === 'ortaokul'" (change)="gradeLevel.set('ortaokul')" class="sr-only peer">
              <div class="p-4 text-center rounded-lg border-2 cursor-pointer transition-all peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 hover:border-indigo-400 font-semibold text-lg">
                Ortaokul (5-8. Sınıf)
              </div>
            </label>
          </div>
        </div>

        <!-- Theme Selection -->
        <div>
           <label class="text-xl font-semibold text-gray-700 mb-3 block">2. Hikaye Teması Seç</label>
           <div class="grid grid-cols-3 md:grid-cols-6 gap-3">
              @for(theme of storyThemes; track theme.id) {
                <button (click)="selectedTheme.set(theme.id)"
                        class="p-3 rounded-lg font-semibold transition-all duration-200 border-2 flex flex-col items-center justify-center gap-1"
                        [class]="theme.color"
                        [class.border-indigo-500]="selectedTheme() === theme.id"
                        [class.ring-2]="selectedTheme() === theme.id"
                        [class.ring-indigo-300]="selectedTheme() === theme.id"
                        [class.border-transparent]="selectedTheme() !== theme.id">
                    <span class="text-3xl">{{ theme.icon }}</span>
                    <span>{{ theme.name }}</span>
                </button>
              }
           </div>
        </div>
      </div>

      <button (click)="generateStory()" [disabled]="loading()" class="w-full sm:w-auto bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:scale-100 flex items-center justify-center text-lg">
        @if (loading()) {
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Oluşturuluyor...</span>
        } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <span>Hikaye Oluştur</span>
        }
      </button>
      
      @if (error()) {
        <div class="mt-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <strong>Hata:</strong> {{ error() }}
        </div>
      }
    </div>
  } @else {
    <!-- Render the activity display component for the interactive experience -->
    <app-activity-display
        [activity]="generatedActivity()!"
        topic="disleksi" 
        [subTopicId]="'review'"
        [initialAnswers]="null"
        [feedbackSettings]="feedbackSettings()"
        (nextActivity)="reset()"
    ></app-activity-display>
  }
</div>
