<div class="animate-pulse space-y-4">
  <!-- Header Skeleton -->
  <div class="text-center mb-6 border-b border-slate-200 pb-4">
    <div class="h-8 bg-slate-200 rounded-md w-3/5 mx-auto"></div>
    <div class="h-5 bg-slate-200 rounded-md w-4/5 mx-auto mt-3"></div>
  </div>

  <!-- Progress Bar Skeleton -->
  <div class="mb-6">
    <div class="h-2.5 bg-slate-200 rounded-full w-full"></div>
  </div>

  <!-- Question Skeletons -->
  <div class="space-y-4">
    @for (_ of [1, 2, 3, 4]; track $index) {
      <div class="p-4 sm:p-5 bg-white shadow-md rounded-lg">
        <div class="flex flex-col sm:flex-row items-center gap-4">
          <div class="h-8 w-8 bg-slate-200 rounded-full flex-shrink-0"></div>
          <div class="flex-grow w-full space-y-3">
            <div class="h-6 bg-slate-200 rounded-md w-3/4"></div>
            <div class="h-12 bg-slate-200 rounded-md w-1/2"></div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
