<div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-200 animate-fade-in">
  <div class="flex items-center justify-between mb-6 no-print">
    <button (click)="goBack()" class="flex items-center text-gray-600 hover:text-indigo-600 transition-colors duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
      </svg>
      Geri
    </button>
    <h2 class="text-2xl font-bold text-gray-800">{{ topicTitle() }}</h2>
    <div class="w-16"></div> <!-- Spacer -->
  </div>

  @if (!activity()) {
    <div class="space-y-6 no-print">
      <div>
        <label class="text-lg font-semibold text-gray-700 mb-2 block">Seviye Seçin</label>
        <div class="flex space-x-4">
          <label class="flex-1">
            <input type="radio" name="grade" value="ilkokul" [checked]="gradeLevel() === 'ilkokul'" (change)="gradeLevel.set('ilkokul')" class="sr-only peer">
            <div class="p-4 text-center rounded-lg border-2 cursor-pointer transition-all peer-checked:bg-indigo-500 peer-checked:text-white peer-checked:border-indigo-500 hover:border-indigo-400">
              İlkokul (1-4. Sınıf)
            </div>
          </label>
          <label class="flex-1">
            <input type="radio" name="grade" value="ortaokul" [checked]="gradeLevel() === 'ortaokul'" (change)="gradeLevel.set('ortaokul')" class="sr-only peer">
            <div class="p-4 text-center rounded-lg border-2 cursor-pointer transition-all peer-checked:bg-indigo-500 peer-checked:text-white peer-checked:border-indigo-500 hover:border-indigo-400">
              Ortaokul (5-8. Sınıf)
            </div>
          </label>
        </div>
      </div>

      <div class="text-center pt-4">
        <button (click)="generateActivity()" [disabled]="loading()" class="w-full sm:w-auto bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:scale-100 flex items-center justify-center">
          @if (loading()) {
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Oluşturuluyor...</span>
          } @else {
            <span>Etkinlik Oluştur</span>
          }
        </button>
      </div>
    </div>
  }

  @if (error()) {
    <div class="mt-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg no-print">
      <strong>Hata:</strong> {{ error() }}
    </div>
  }
  
  @if (activity(); as currentActivity) {
    <div class="mt-6">
      <app-activity-display 
        [activity]="currentActivity"
        [topic]="topic()"
        [initialAnswers]="null"
        [feedbackSettings]="feedbackSettings()"
        (activitySuccess)="onActivitySuccess($event)"
        (nextActivity)="generateActivity()"></app-activity-display>
       <div class="text-center pt-8 no-print">
        <button (click)="generateActivity()" [disabled]="loading()" class="w-full sm:w-auto bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition-transform transform hover:scale-105 disabled:bg-gray-400 disabled:cursor-not-allowed disabled:scale-100 flex items-center justify-center">
          @if (loading()) {
             <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Oluşturuluyor...</span>
          } @else {
             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5V4H4zm0 12v5h5v-5H4zM15 4v5h5V4h-5zm0 12v5h5v-5h-5z" />
             </svg>
            <span>Yeni Etkinlik Oluştur</span>
          }
        </button>
      </div>
    </div>
  }
</div>
