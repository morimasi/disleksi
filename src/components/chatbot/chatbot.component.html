@if (isWindowOpen()) {
  <!-- Chat Window -->
  <div class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 w-[calc(100%-2rem)] max-w-sm h-[70vh] max-h-[500px] flex flex-col bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl border border-slate-200 animate-fade-in">
    <!-- Header -->
    <header class="p-3 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🦉</span>
        <h3 class="text-lg font-bold text-slate-800">Bilge Baykuş</h3>
      </div>
      <button (click)="toggleChatWindow()" class="p-2 rounded-full text-slate-500 hover:bg-slate-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
      </button>
    </header>

    <!-- Messages -->
    <div #messageContainer class="flex-grow p-4 space-y-4 overflow-y-auto">
      @for(message of messages(); track $index) {
        <div class="flex gap-3 items-end" [class.flex-row-reverse]="message.author === 'user'">
          @if(message.author === 'ai') {
            <div class="w-8 h-8 rounded-full bg-indigo-200 text-lg flex items-center justify-center flex-shrink-0">🦉</div>
          }
          <div class="max-w-[80%] rounded-2xl p-3 text-base break-words"
               [class.bg-slate-200]="message.author === 'ai'"
               [class.text-slate-800]="message.author === 'ai'"
               [class.rounded-bl-lg]="message.author === 'ai'"
               [class.bg-indigo-600]="message.author === 'user'"
               [class.text-white]="message.author === 'user'"
               [class.rounded-br-lg]="message.author === 'user'">
            {{ message.content }}
          </div>
        </div>
      }
      @if(isLoading() && messages()[messages().length - 1]?.author === 'ai' && messages()[messages().length - 1]?.content === '') {
         <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-indigo-200 text-lg flex items-center justify-center flex-shrink-0">🦉</div>
            <div class="max-w-[80%] rounded-2xl p-3 text-base bg-slate-200 text-slate-800 rounded-bl-lg">
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse"></div>
                    <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse" style="animation-delay: 0.2s;"></div>
                    <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse" style="animation-delay: 0.4s;"></div>
                </div>
            </div>
         </div>
      }
    </div>

    <!-- Input -->
    <footer class="p-3 border-t border-slate-200 flex-shrink-0">
      <form (submit)="sendMessage(); $event.preventDefault()">
        <div class="relative">
          <input type="text"
                 [value]="userInput()"
                 (input)="userInput.set($any($event.target).value)"
                 [disabled]="isLoading()"
                 placeholder="Bir mesaj yaz..."
                 class="w-full px-4 py-3 pr-12 bg-white border-2 border-slate-300 rounded-full text-base focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
          <button type="submit" [disabled]="isLoading() || userInput().trim() === ''" class="absolute inset-y-0 right-0 flex items-center justify-center w-12 h-full text-indigo-600 hover:text-indigo-800 disabled:text-slate-300 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
          </button>
        </div>
      </form>
    </footer>
  </div>
} @else {
  <!-- FAB -->
  <button (click)="toggleChatWindow()" title="Bilge Baykuş ile Sohbet Et" class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 w-16 h-16 rounded-full bg-gradient-to-br from-[rgb(var(--c-accent-500))] to-[rgb(var(--c-accent-700))] text-white flex items-center justify-center shadow-xl hover:scale-110 active:scale-100 transition-transform transform">
    <span class="text-3xl">🦉</span>
    <div class="absolute inset-0 rounded-full border-2 border-white/50 animate-pulse-ring"></div>
  </button>
}
